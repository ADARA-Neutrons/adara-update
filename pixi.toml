[workspace]
name = "adara"
channels = [
  "conda-forge",
]
platforms = ["linux-64"] # do we want win-64 or osx-arm64?


[tasks]
# Build and run the GoogleTest parser unit-test suite (common/test/).
test = { cmd = "make check", cwd = "common/test" }
# Build the test binary without running it.
build-tests = { cmd = "make", cwd = "common/test" }
# Remove the test binary and its object files.
clean-tests = { cmd = "make clean", cwd = "common/test" }

[dependencies]
autoconf = "2.69.*" # copied from rhel9
automake = "1.16.*" # copied from rhel9
hdf5 = "1.14.*" # copied from mantid
libboost-devel = "1.88.*" # copied from mantid
log4cpp = "1.1.*" # copied from rhel9
pkg-config = "*"
gtest = "*" # unit test framework (conda-forge)

[target.linux-64.dependencies]
gxx_linux-64 = "13.*" # copied from mantid
